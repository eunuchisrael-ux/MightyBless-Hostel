<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MightyBless Hostel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="form-section">
        <h2>Room Application Form</h2>
        <p>Fill out the details below to secure your spot for the 2026 academic year.</p>
        
        <form action="#" id="bookingForm">
            <label for="fname">Full Name:</label>
            <input type="text" id="fname" name="fname" required placeholder="Enter your full name">

            <label for="index">Index Number:</label>
            <input type="text" id="index" name="index" required placeholder="e.g. 522104xxxx">

            <label for="room-select">Select Room Type:</label>
            <select id="room-select" name="room-select">
                <option value="2-in-1">2-in-a-room (Executive)</option>
                <option value="4-in-1">4-in-a-room (Standard)</option>
            </select>

            <button type="submit" class="btn">Submit Application</button>
        </form>
    </section>
</body>
</html>
